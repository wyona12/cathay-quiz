function renderQuiz() {
    const container = document.getElementById('quiz-container');
    // 清空容器，避免重複渲染
    container.innerHTML = ""; 

    quizData.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question'; // 使用你 CSS 定義的樣式

        // 自動判斷：如果 type 是 multiple 或者題目名稱包含「複選」，就用 checkbox
        const isMultiple = q.type === "multiple" || q.title.includes("複選");
        const inputType = isMultiple ? "checkbox" : "radio";
        
        div.innerHTML = `
            <p><strong>第 ${q.id} 題：${q.title}</strong></p>
            <div class="options-grid">
                ${q.options.map((opt) => `
                    <label style="display: block; padding: 5px 0;">
                        <input type="${inputType}" name="q${index}" value="${opt.charAt(1)}"> ${opt}
                    </label>`).join('')}
            </div>
            <button style="margin-top: 10px; background: #007bff; color: white;" onclick="checkAnswer(${index})">檢查答案</button>
            <div id="result-${index}" style="margin-top: 10px; padding: 5px;"></div>
        `;
        container.appendChild(div);
    });
}

function checkAnswer(index) {
    const q = quizData[index];
    const inputs = document.querySelectorAll(`input[name="q${index}"]:checked`);
    const resultDiv = document.getElementById(`result-${index}`);
    
    // 取得使用者選的所有字母並排序
    const userAnswers = Array.from(inputs).map(i => i.value).sort().join('');
    // 正確答案也排序比對
    const correctAnswers = q.answer.split('').sort().join('');

    if (userAnswers === "") {
        resultDiv.innerHTML = "<span style='color: orange;'>請至少選擇一個答案！</span>";
        return;
    }

    if (userAnswers === correctAnswers) {
        resultDiv.innerHTML = `<span style='color: green;'>正確！🎉 答案是 ${q.answer}</span>`;
        if (q.note) {
            resultDiv.innerHTML += `<div style="font-size: 14px; color: #666; background: #eee; padding: 5px; margin-top: 5px;">解析：${q.note}</div>`;
        }
    } else {
        resultDiv.innerHTML = `<span style='color: red;'>錯誤 ❌。正確答案是：${q.answer}</span>`;
    }
}

// 執行渲染
renderQuiz();
